services:
  - type: web
    name: focusflow-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r api/requirements.txt && python database/db.py
    startCommand: cd api && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        scope: build
        value: https://your-frontend.vercel.app
      - key: SECRET_KEY
        scope: build
        value: your-secret-key-here
